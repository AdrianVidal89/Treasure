services:
  db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U treasure_user -d treasure_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: python:3.12-slim
    restart: always
    working_dir: /app
    volumes:
      - .:/app
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    env_file:
      - .env
    ports:
      - "8181:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "pip install -r requirements.txt --quiet &&
             python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 1 --threads 4"
