{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Treasure{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
  

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const toggles = document.querySelectorAll(".nav-user-toggle");
    
        toggles.forEach(function(toggle) {
            const menu = toggle.nextElementSibling;
    
            toggle.addEventListener("click", function (e) {
                e.stopPropagation();
                document.querySelectorAll(".nav-user-menu").forEach(m => m.style.display = "none");
                menu.style.display = "block";
            });
        });
    
        document.addEventListener("click", function () {
            document.querySelectorAll(".nav-user-menu").forEach(menu => {
                menu.style.display = "none";
            });
        });
    });
</script>
<body class="{% block body_class %}{% endblock %}">
    {% if request.user.is_authenticated and not hide_navbar %}
    <!-- REEMPLAZA el bloque navbar-left completo -->
<div class="navbar-left">
    <img src="{% static 'img/logo_treasure_3.png' %}" class="nav-logo" alt="Treasure Logo">
    <span class="nav-title">Treasure</span>

    <div class="nav-user-dropdown">
        <span class="nav-user-toggle">Ingresos</span>
        <div class="nav-user-menu">
            <a href="{% url 'finanzas:listar_ingresos' %}">💰 Ver ingresos</a>
            <a href="{% url 'finanzas:crear_ingreso' %}">➕ Ingreso</a>
        </div>
    </div>

    <div class="nav-user-dropdown">
        <span class="nav-user-toggle">Gastos</span>
        <div class="nav-user-menu">
            <a href="{% url 'finanzas:listar_gastos' %}">📋 Ver gastos</a>
            <a href="{% url 'finanzas:crear_partida' %}">➕ Gasto</a>
        </div>
    </div>

    <a href="{% url 'finanzas:vista_distribucion' %}" style="color: var(--text-color); text-decoration: none; font-size: 0.9rem; padding: 6px 10px;">
        Distribución
    </a>

    <a href="{% url 'finanzas:vista_evolucion' %}" style="color: var(--text-color); text-decoration: none; font-size: 0.9rem; padding: 6px 10px;">
        Evolución
    </a>
</div>
    {% endif %}

    {% block content %}
    {% endblock %}    
</body>
    
</html>
